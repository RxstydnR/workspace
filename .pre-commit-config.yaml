repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: uv run ruff format .
        entry: uv run ruff format .
        language: system
        pass_filenames: false
      - id: black
        name: uv run black .
        entry: uv run black .
        language: system
        pass_filenames: false
      - id: mypy
        name: uv run mypy .
        entry: uv run mypy .
        language: system
        pass_filenames: false
      # - id: ruff-check-fix
      #   name: uv run ruff check --fix .
      #   entry: uv run ruff check --fix .
      #   language: system
      #   pass_filenames: false